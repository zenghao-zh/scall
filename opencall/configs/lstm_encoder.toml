[model]
package = "opencall.models.rnn_encoder"

[labels]
labels = [ "N", "A", "C", "G", "T",]

[input]
features = 1

[qscore]
bias = 0.0
scale = 1.0

[encoder]
stride = 5
winlen = 19
num_layers=5
features = 768
rnn_type = "lstm"
activation = "swish"

[global_norm]
state_len = 5

[basecaller]
batchsize = 128
chunksize = 5000
overlap = 500

